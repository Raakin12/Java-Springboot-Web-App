<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcmePlex - Home</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/specific/index.css">
</head>

<body>
    <aside class="sidebar">
        <div class="logo">
            <img src="/assets/acmeplex-logo-text.png" alt="AcmePlex Logo" />
        </div>
        <nav class="main-menu">
            <ul id="menu-items">
                <li><a href="/">Home</a></li>
                <li><a href="/theatres.html">Find Tickets</a></li>
                <li><a href="/cancel.html">Cancel Booking</a></li>
            </ul>
        </nav>
        <nav class="main-menu" id="auth-menu">
            <ul id="auth-links">
            </ul>
        </nav>
    </aside>

    <main class="content" id="content">
        <div class="film-reel"></div>
        <div class="logo-container">
            <a href="/about.html">

                <img src="/assets/acmeplexlogo-main.png" alt="AcmePlex Main Logo" id="logo" />
            </a>
        </div>
    </main>

    <script>
        async function updateAuthLinks() {
            try {
                const response = await fetch('/api/auth/status');
                if (!response.ok) throw new Error('Failed to fetch authentication status');

                const isAuthenticated = await response.json();
                const authLinks = document.getElementById('auth-links');
                authLinks.innerHTML = '';

                if (isAuthenticated) {
                    authLinks.innerHTML = `
                        <li><a href="/settings.html">Settings</a></li>
                        <li><a href="/notifications.html">Notification Center</a></li>
                        <li><a href="#" id="logout-button">Logout</a></li>
                    `;

                    const logoutButton = document.getElementById('logout-button');
                    logoutButton.onclick = async (e) => {
                        e.preventDefault();
                        try {
                            const logoutResponse = await fetch('/logout', { method: 'POST' });
                            if (logoutResponse.ok) {
                                window.location.href = '/index.html';
                            } else {
                                console.error('Failed to log out', logoutResponse.status);
                            }
                        } catch (error) {
                            console.error('Error during logout:', error);
                        }
                    };
                } else {
                    authLinks.innerHTML = `
                        <li><a href="/signin.html">Sign-In</a></li>
                        <li><a href="/signup.html">Sign-Up</a></li>
                    `;
                }
            } catch (error) {
                console.error('Error updating authentication links:', error);
            }
        }

        const logo = document.getElementById('logo');
        const content = document.getElementById('content');

        logo.addEventListener('mouseover', () => {
            content.style.backgroundImage = "url('/assets/acmeplexlogo-banner-blurred.png')";
        });

        logo.addEventListener('mouseout', () => {
            content.style.backgroundImage = "url('/assets/acmeplexlogo-banner.png')";
        });

        window.onload = () => {
            updateAuthLinks();
        };
    </script>
</body>

</html>
