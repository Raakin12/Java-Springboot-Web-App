<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - AcmePlex</title>
    <link rel="stylesheet" href="/css/style.css">

</head>

<body class="signin-page">
    <aside class="sidebar">
        <div class="logo">
            <a href="/">
                <img src="assets/acmeplex-logo-text.png" alt="AcmePlex Logo">
            </a>
        </div>
        <nav class="main-menu">
            <ul id="menu-items">
                <li><a href="/">Home</a></li>
                <li><a href="/theatres.html">FIND TICKETS</a></li>
                <li><a href="/cancel.html">Cancel Booking</a></li>
            </ul>
        </nav>

        <nav class="main-menu" id="auth-menu">
            <ul id="auth-links">
            </ul>
        </nav>
    </aside>
    <div class="signin-container">
        <div class="signin-card">
            <h1>Welcome Back!</h1>
            <p class="signin-subtext">Sign in to access your account</p>
            <form id="login-form" class="signin-form" method="POST" action="/signin">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-primary">Sign In</button>
            </form>

            <div class="signin-footer">
                <p>Don't have an account? <a href="/signup.html">Sign up</a></p>
                <button onclick="continueAsGuest()" class="btn-secondary">Continue as Guest</button>
            </div>
        </div>
    </div>

    <script>
        async function checkAuthentication() {
            try {
                const response = await fetch('/api/auth/status');
                const isAuthenticated = await response.json();

                if (isAuthenticated) {
                    window.location.href = '/theatres.html';
                }
            } catch (error) {
                console.error('Error checking authentication status:', error);
            }
        }

        function continueAsGuest() {
            window.location.href = "/theatres.html";
        }


        async function updateAuthLinks() {
            try {
                const response = await fetch('/api/auth/status');
                if (!response.ok) throw new Error('Failed to fetch authentication status');

                const isAuthenticated = await response.json();
                const authLinks = document.getElementById('auth-links');
                authLinks.innerHTML = '';

                if (isAuthenticated) {
                    authLinks.innerHTML += `
                    <li><a href="/notifications.html">Notification Center</a></li>
                    <li><a href="#" id="logout-button">Logout</a></li>
                `;

                    const logoutButton = document.getElementById('logout-button');
                    logoutButton.onclick = async (e) => {
                        e.preventDefault();
                        try {
                            const logoutResponse = await fetch('/logout', { method: 'POST' });
                            if (logoutResponse.ok) {
                                window.location.href = '/index.html';
                            } else {
                                console.error('Failed to log out', logoutResponse.status);
                            }
                        } catch (error) {
                            console.error('Error during logout:', error);
                        }
                    };
                } else {
                    authLinks.innerHTML += `
                    <li><a href="/signin.html">Sign-In</a></li>
                    <li><a href="/signup.html">Sign-Up</a></li>
                `;
                }
            } catch (error) {
                console.error('Error updating authentication links:', error);
            }
        }

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const error = urlParams.get('error');
            if (error) {
                const errorMessage = document.createElement('p');
                errorMessage.textContent = "Invalid username or password. Please try again.";
                errorMessage.style.color = "red";
                const form = document.getElementById('login-form');
                form.prepend(errorMessage);
            }

            checkAuthentication();
            updateAuthLinks();
        };

    </script>
</body>

</html>
