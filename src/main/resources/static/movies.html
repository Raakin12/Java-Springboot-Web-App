<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/specific/movie.css">
</head>

<body class="movie-page">
    <aside class="sidebar">
        <div class="logo">
            <a href="/">
                <img src="assets/acmeplex-logo-text.png" alt="AcmePlex Logo" />
            </a>
        </div>

        <nav class="main-menu">
            <ul id="menu-items">
                <li><a href="/">Home</a></li>
                <li><a href="/theatres.html">FIND TICKETS</a></li>
                <li><a href="/cancel.html">Cancel Booking</a></li>

            </ul>
        </nav>

        <nav class="main-menu" id="auth-menu">
            <ul id="auth-links">
             </ul>
        </nav>
    </aside>

    <main class="content">
        <div class="movie-container">
            <div class="movie-header">
                <div class="search-container">
                    <input type="text" id="movie-search" class="search-bar" placeholder="Search for movies...">
                    <img src="/assets/images/search_icon.png" alt="Search Icon" class="search-icon">
                </div>
            </div>
            <h1 class="movie-title">Movies</h1>
            <div id="movie-list" class="movie-list">
            </div>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const theatreId = urlParams.get('theatreId');
        let movies = [];

        async function fetchMovies() {
            try {
                const response = await fetch(`/api/Movies/available`);
                if (!response.ok) throw new Error('Failed to fetch movies for guests');

                movies = await response.json();
                displayMovies(movies);
            } catch (error) {
                console.error('Error fetching guest movies:', error);
                alert('Unable to load movies. Please try again later.');
            }
        }

        function displayMovies(movieList) {
            const movieListContainer = document.getElementById('movie-list');
            movieListContainer.innerHTML = '';

            movieList.forEach(movie => {
                const movieCard = document.createElement('div');
                movieCard.className = 'movie-card';

                movieCard.innerHTML = `
                    <div class="movie-img-container">
                        <img src="${movie.imageUrl}" alt="${movie.title}" class="movie-img">
                    </div>
                    <div class="movie-details">
                        <div class="movie-name">${movie.title}</div>
                        <div class="movie-genre"><strong>Genre:</strong> ${movie.genre || 'N/A'}</div>
                        <div class="movie-rating"><strong>Rating:</strong> ${movie.rating || 'N/A'}</div>
                        <div class="movie-description">${movie.description || 'No description available.'}</div>
                    </div>
                `;

                movieCard.onclick = () => {
                    const route = `/showtime.html?movieId=${movie.id}&theatreId=${theatreId}`;
                    window.location.href = route;
                };

                movieListContainer.appendChild(movieCard);
            });
        }

        const searchInput = document.getElementById('movie-search');
        searchInput.addEventListener('input', () => {
            const query = searchInput.value.toLowerCase();
            const filteredMovies = movies.filter(movie =>
                movie.title.toLowerCase().includes(query)
            );
            displayMovies(filteredMovies);
        });

        async function updateAuthLinks() {
            try {
                const response = await fetch('/api/auth/status');
                if (!response.ok) throw new Error('Failed to fetch authentication status');

                const isAuthenticated = await response.json();
                const authLinks = document.getElementById('auth-links');
                authLinks.innerHTML = '';

                if (isAuthenticated) {
                    authLinks.innerHTML = `
                        <li><a href="/settings.html">Settings</a></li>
                        <li><a href="/notifications.html">Notification Center</a></li>
                        <li><a href="#" id="logout-button">Logout</a></li>
                    `;

                    const logoutButton = document.getElementById('logout-button');
                    logoutButton.onclick = async (e) => {
                        e.preventDefault();
                        try {
                            const logoutResponse = await fetch('/logout', { method: 'POST' });
                            if (logoutResponse.ok) {
                                window.location.href = '/index.html';
                            } else {
                                console.error('Failed to log out', logoutResponse.status);
                            }
                        } catch (error) {
                            console.error('Error during logout:', error);
                        }
                    };
                } else {
                    authLinks.innerHTML = `
                        <li><a href="/signin.html">Sign-In</a></li>
                        <li><a href="/signup.html">Sign-Up</a></li>
                    `;
                }
            } catch (error) {
                console.error('Error updating authentication links:', error);
            }
        }




        window.onload = () => {
            fetchMovies();
            updateAuthLinks();
        };
    </script>
</body>

</html>
