<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cancel Booking</title>
    <link rel="stylesheet" href="/css/style.css">

</head>

<body class="cancel-page">
    <aside class="sidebar">
        <div class="logo">
            <a href="/">
                <img src="assets/acmeplex-logo-text.png" alt="AcmePlex Logo">
            </a>
        </div>
        <nav class="main-menu">
            <ul id="menu-items">
                <li><a href="/">Home</a></li>
                <li><a href="/theatres.html">FIND TICKETS</a></li>
                <li><a href="/cancel.html">Cancel Booking</a></li>
            </ul>
        </nav>

        <nav class="main-menu" id="auth-menu">
            <ul id="auth-links">
            </ul>
        </nav>
    </aside>
    <div class="cancel-container">
        <div class="cancel-card">
            <h1>Cancel Booking</h1>
            <p class="cancel-subtext">Enter your Booking ID to cancel your booking.</p>
            <form id="cancel-form" class="cancel-form">
                <div class="form-group">
                    <label for="bookingId">Booking ID:</label>
                    <input type="text" id="bookingId" name="bookingId" placeholder="Enter your booking ID" required>
                </div>
                <div class="form-group hidden" id="email-container">
                    <label for="guestEmail">Guest Email:</label>
                    <input type="email" id="guestEmail" name="guestEmail" placeholder="Enter your email ">
                </div>
                <button type="submit" class="btn-primary">Cancel Booking</button>
            </form>
            <div id="message" class="cancel-message hidden"></div>
        </div>
    </div>

    <script>
        const form = document.getElementById('cancel-form');
        const messageDiv = document.getElementById('message');
        const emailContainer = document.getElementById('email-container');

        async function checkAuthentication() {
            try {
                const response = await fetch('/api/auth/status');
                const isAuthenticated = await response.json();
                if (!isAuthenticated) {
                    emailContainer.classList.remove('hidden');
                }
            } catch (error) {
                console.error('Error checking authentication status:', error);
            }
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();

            const bookingIdInput = document.getElementById('bookingId');
            const guestEmailInput = document.getElementById('guestEmail');
            const bookingId = bookingIdInput.value.trim();
            const guestEmail = guestEmailInput?.value.trim();
            bookingIdInput.value = '';
            guestEmailInput.value = '';

            if (!bookingId) {
                showMessage('Booking ID is required!', 'error');
                return;
            }

            try {
                let url = `/api/credit/cancellation/${bookingId}`;
                if (guestEmail) {
                    url += `?guestEmail=${encodeURIComponent(guestEmail)}`;
                }

                try {
                    const response = await fetch(url, { method: 'GET' });

                    if (!response.ok) {
                        const errorBody = await response.json();
                        const errorMessage = errorBody.message;

                        showMessage(errorMessage, 'error');
                        return;
                    }

                    const creditAmount = await response.json();
                    showMessage(`Booking cancelled successfully! You have received a credit of $${creditAmount.toFixed(2)}.`, 'success');
                } catch (error) {
                    console.error('Error:', error);
                    showMessage('An unexpected error occurred. Please try again.', 'error');
                }


            } catch (error) {
                console.error('Error:', error);
                showMessage('An unexpected error occurred. Please try again.', 'error');
            }
        });

        function showMessage(message, type) {
            messageDiv.textContent = message;
            messageDiv.className = `cancel-message ${type}`;
            messageDiv.classList.remove('hidden');
        }

        async function updateAuthLinks() {
            try {
                const response = await fetch('/api/auth/status');
                if (!response.ok) throw new Error('Failed to fetch authentication status');

                const isAuthenticated = await response.json();
                const authLinks = document.getElementById('auth-links');
                authLinks.innerHTML = '';

                if (isAuthenticated) {
                    authLinks.innerHTML = `
                <li><a href="/settings.html">Settings</a></li>
                <li><a href="/notifications.html">Notification Center</a></li>
                <li><a href="#" id="logout-button">Logout</a></li>
            `;

                    const logoutButton = document.getElementById('logout-button');
                    logoutButton.onclick = async (e) => {
                        e.preventDefault();
                        try {
                            const logoutResponse = await fetch('/logout', { method: 'POST' });
                            if (logoutResponse.ok) {
                                window.location.href = '/index.html';
                            } else {
                                console.error('Failed to log out', logoutResponse.status);
                            }
                        } catch (error) {
                            console.error('Error during logout:', error);
                        }
                    };
                } else {
                    authLinks.innerHTML = `
                <li><a href="/signin.html">Sign-In</a></li>
                <li><a href="/signup.html">Sign-Up</a></li>
            `;
                }
            } catch (error) {
                console.error('Error updating authentication links:', error);
            }
        }

        window.onload = () => {

            checkAuthentication();
            updateAuthLinks();
        };


    </script>
</body>

</html>
