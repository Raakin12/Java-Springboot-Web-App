<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select a Theatre</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/specific/theatres.css">
</head>

<body class="theatre-page">
    <aside class="sidebar">
        <div class="logo">
            <a href="/"><img src="assets/acmeplex-logo-text.png" alt="AcmePlex Logo" /></a>
        </div>

        <nav class="main-menu">
            <ul id="menu-items">
                <li><a href="/">Home</a></li>
                <li><a href="/theatres.html">FIND TICKETS</a></li>
                <li><a href="/cancel.html">Cancel Booking</a></li>

            </ul>
        </nav>

        <nav class="main-menu" id="auth-menu">
            <ul id="auth-links">
            </ul>
        </nav>
    </aside>

    <main class="content">
        <div class="theatre-container">
            <h1 class="theatre-title">Select a Theatre</h1>
            <div id="theatre-list" class="theatre-list">
            </div>
        </div>
    </main>

    <script>
        async function fetchTheatres() {
            try {
                const response = await fetch('/api/theatres');
                if (!response.ok) throw new Error('Failed to fetch theatres');
                const theatres = await response.json();

                const theatreList = document.getElementById('theatre-list');
                theatreList.innerHTML = '';

                theatres.forEach(theatre => {
                    const theatreDiv = document.createElement('div');
                    theatreDiv.className = 'theatre-card';
                    theatreDiv.innerHTML = `
                        <img src="${theatre.imageUrl}" alt="${theatre.name}" class="theatre-image"/>
                        <div class="theatre-name">${theatre.name}</div>
                        <div class="theatre-location">${theatre.location}</div>
                    `;
                    theatreDiv.onclick = () => {
                        window.location.href = `/movies.html?theatreId=${theatre.id}`;
                    };
                    theatreList.appendChild(theatreDiv);
                });
            } catch (error) {
                console.error('Error fetching theatres:', error);
                alert('Unable to load theatres. Please try again later.');
            }
        }

        async function updateAuthLinks() {
            try {
                const response = await fetch('/api/auth/status');
                if (!response.ok) throw new Error('Failed to fetch authentication status');

                const isAuthenticated = await response.json();
                const authLinks = document.getElementById('auth-links');
                authLinks.innerHTML = '';

                if (isAuthenticated) {
                    authLinks.innerHTML = `
                        <li><a href="/settings.html">Settings</a></li>
                        <li><a href="/notifications.html">Notification Center</a></li>
                        <li><a href="#" id="logout-button">Logout</a></li>
                    `;

                    const logoutButton = document.getElementById('logout-button');
                    logoutButton.onclick = async (e) => {
                        e.preventDefault();
                        try {
                            const logoutResponse = await fetch('/logout', { method: 'POST' });
                            if (logoutResponse.ok) {
                                window.location.href = '/index.html';
                            } else {
                                console.error('Failed to log out', logoutResponse.status);
                            }
                        } catch (error) {
                            console.error('Error during logout:', error);
                        }
                    };
                } else {
                    authLinks.innerHTML = `
                        <li><a href="/signin.html">Sign-In</a></li>
                        <li><a href="/signup.html">Sign-Up</a></li>
                    `;
                }
            } catch (error) {
                console.error('Error updating authentication links:', error);
            }
        }




        window.onload = () => {
            fetchTheatres();
            updateAuthLinks();
        };
    </script>
</body>

</html>
